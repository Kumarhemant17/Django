<!doctype html>
<html>
  <head>
    <title>Home</title>
  </head>
  <body>
    <h2>Students (age > 22)</h2>
    {% for student in students %}
    <p>
      {{student.name}} - {{student.age}} - {{student.email}} -
      {{student.created_at}}
    </p>
    {% endfor %}

    <h2>Total Students: {{students_count}}</h2>

    <h3>All Students Ordered by Name</h3>
    {% for s in student_name %}
    <p>{{s.name}}</p>
    {% endfor %}
  </body>
</html>
